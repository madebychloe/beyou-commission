<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Be You — Commission</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-logo"><span class="brand-logo-text">BE</span></div>
      <span class="brand-name">Be You Skin Management</span>
      <span class="brand-sub">Commission Tracker</span>
    </div>
    <div class="card login-card">
      <div class="field-group">
        <label class="field-label">PIN</label>
        <div class="pin-wrap">
          <input id="login-pin" type="password" inputmode="text" autocomplete="off" maxlength="10" placeholder="Enter PIN" class="field-input" autocomplete="current-password" />
          <button class="pin-toggle" onclick="togglePin('login-pin', this)">👁</button>
        </div>
      </div>
      <button id="login-btn" class="btn btn-primary btn-full" onclick="handleLogin()">SIGN IN</button>
      <p id="login-error" class="error-msg hidden"></p>
    </div>
  </div>
</div>

<!-- ═══════════════ FORCE RESET PIN ═══════════════ -->
<div id="screen-reset-pin" class="screen">
  <div class="page-header-dark">
    <h2 class="page-title-light">Set Your PIN</h2>
    <p class="page-sub-light">First login — please set a new PIN.</p>
  </div>
  <div class="page-body">
    <div class="card">
      <div class="field-group">
        <label class="field-label">Current PIN (default)</label>
        <div class="pin-wrap">
          <input id="reset-old" type="password" inputmode="text" autocomplete="off" maxlength="10" placeholder="Your default PIN" class="field-input" />
          <button class="pin-toggle" onclick="togglePin('reset-old', this)">👁</button>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">New PIN</label>
        <div class="pin-wrap">
          <input id="reset-new" type="password" inputmode="text" autocomplete="new-password" maxlength="10" placeholder="Min 5 digits" class="field-input" />
          <button class="pin-toggle" onclick="togglePin('reset-new', this)">👁</button>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Confirm New PIN</label>
        <div class="pin-wrap">
          <input id="reset-confirm" type="password" inputmode="text" autocomplete="new-password" maxlength="10" placeholder="Repeat new PIN" class="field-input" />
          <button class="pin-toggle" onclick="togglePin('reset-confirm', this)">👁</button>
        </div>
      </div>
      <button id="reset-btn" class="btn btn-primary btn-full" onclick="handleForceReset()">SET PIN & CONTINUE</button>
      <p id="reset-error" class="error-msg hidden"></p>
    </div>
  </div>
</div>

<!-- ═══════════════ MAIN APP ═══════════════ -->
<div id="screen-app" class="screen">
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">BE</span>
      <span class="topbar-title">BE YOU</span>
    </div>
    <div class="topbar-right">
      <span id="topbar-user" class="topbar-user"></span>
      <button class="icon-btn" onclick="showSettings()" aria-label="Settings">⚙️</button>
      <button class="icon-btn" onclick="handleLogout()" aria-label="Logout">🚪</button>
    </div>
  </header>

  <main class="app-main" id="app-main"></main>

  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-btn active" data-tab="records" onclick="switchTab('records')">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Records</span>
    </button>
    <button class="nav-btn" data-tab="add" onclick="switchTab('add')">
      <span class="add-icon">＋</span>
      <span class="nav-label">Add</span>
    </button>
    <button class="nav-btn" data-tab="dashboard" onclick="switchTab('dashboard')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Dashboard</span>
    </button>
  </nav>
</div>

<!-- ═══════════════ MODAL: Settings ═══════════════ -->
<div id="modal-settings" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Change PIN</h3>
      <button onclick="closeModal('modal-settings')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">Current PIN</label>
        <input id="cp-old" type="password" inputmode="text" autocomplete="off" maxlength="10" class="field-input" />
      </div>
      <div class="field-group">
        <label class="field-label">New PIN</label>
        <input id="cp-new" type="password" inputmode="text" autocomplete="new-password" maxlength="10" class="field-input" />
      </div>
      <div class="field-group">
        <label class="field-label">Confirm New PIN</label>
        <input id="cp-confirm" type="password" inputmode="text" autocomplete="new-password" maxlength="10" class="field-input" />
      </div>
      <button class="btn btn-primary btn-full" onclick="handleChangePin()">UPDATE PIN</button>
      <p id="cp-msg" class="error-msg hidden"></p>
    </div>
  </div>
</div>

<!-- ═══════════════ MODAL: Edit Record ═══════════════ -->
<div id="modal-edit" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-edit-title">Edit Record</h3>
      <button onclick="closeModal('modal-edit')">✕</button>
    </div>
    <div class="modal-body" id="modal-edit-body"></div>
  </div>
</div>

<!-- ═══════════════ TOAST ═══════════════ -->
<div id="toast" class="toast hidden"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/tabs.js"></script>
<script src="js/export.js"></script>
</body>
</html>
